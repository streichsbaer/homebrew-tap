name: homebrew-cask-ci

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Casks/**
      - README.md
      - .github/workflows/tests.yml
  push:
    branches:
      - main
    paths:
      - Casks/**
      - README.md
      - .github/workflows/tests.yml

permissions:
  contents: read

concurrency:
  group: homebrew-cask-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: macos-15
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      HOMEBREW_NO_INSTALL_FROM_API: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@5b5b9415990a48a7938310ab90c4964bfcb42e89
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tap local checkout
        run: |
          brew untap streichsbaer/tap || true
          brew tap streichsbaer/tap "$GITHUB_WORKSPACE"

      - name: Lint cask
        run: brew style --display-cop-names Casks/openscribe.rb

      - name: Audit cask
        run: brew audit --strict --online --cask streichsbaer/tap/openscribe

      - name: Install cask
        run: |
          brew uninstall --cask openscribe || true
          brew install --cask --verbose streichsbaer/tap/openscribe

      - name: Uninstall cask
        if: always()
        run: brew uninstall --cask openscribe || true
